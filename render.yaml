services:
  - type: web
    name: goalscape-3d-viewer
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: GOALSCAPE_MCP_URL
        sync: false
